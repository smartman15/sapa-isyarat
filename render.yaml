# render-automation skill: render.yaml at repo root.
# docker-expert skill: context is repo root; Dockerfile also at root.
# COPY commands inside Dockerfile reference backend/ explicitly.

services:
  - type: web
    name: sapa-isyarat-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8000"
