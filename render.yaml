# render-automation skill: render.yaml MUST live at the repo root.
# Render reads this file first before doing anything else.
#
# docker-expert skill: dockerContext points to the build context directory.
# dockerfilePath is relative to the repo root, NOT relative to this file.

services:
  - type: web
    name: sapa-isyarat-backend
    env: docker
    plan: free
    # Build context is the backend/ folder — all COPY commands in Dockerfile
    # are relative to this directory.
    dockerContext: ./backend
    # Explicit path to Dockerfile, relative to repo root.
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8000"
